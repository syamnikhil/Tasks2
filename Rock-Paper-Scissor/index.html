<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div class="choices">
            <button class="choice" id="rock">Rock</button>
            <button class="choice" id="paper">Paper</button>
            <button class="choice" id="scissors">Scissors</button>
        </div>

        <div class="result">
            <p id="userChoice">Your Choice:</p>
            <p id="computerChoice">Computer Choice:</p>
            <h2 id="winner">Choose an option</h2>
        </div>

        <div class="scoreboard">
            <h3>User Score: <span id="userScore">0</span></h3>
            <h3>Computer Score: <span id="computerScore">0</span></h3>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
